<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>USD/RUB Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg-primary: #0B0E11;
      --bg-card: #161A1E;
      --accent: #FCD535;
      --accent-hover: #F0B90B;
      --text-primary: #EAECEF;
      --text-secondary: #848E9C;
      --success: #0ECB81;
      --error: #F6465D;
      --border: #2B3139;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
    }
    .card {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }
    .current-rate {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }
    .rate-value {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--accent);
    }
    .rate-label {
      color: var(--text-secondary);
      font-size: 1.1rem;
    }
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .btn {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
    }
    .btn-outline:hover {
      background: rgba(252, 213, 53, 0.1);
    }
    .chart-container {
      position: relative;
      height: 400px;
      width: 100%;
    }
    .loading {
      text-align: center;
      color: var(--text-secondary);
      padding: 40px;
    }
    .error {
      color: var(--error);
      text-align: center;
      padding: 12px;
      background: rgba(246, 70, 93, 0.1);
      border-radius: 8px;
      margin-bottom: 16px;
      display: none;
    }
    .error.show { display: block; }
    @media (max-width: 768px) {
      .rate-value { font-size: 2rem; }
      .chart-container { height: 300px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">💱 USD/RUB Tracker</div>
      <div style="color: var(--text-secondary); font-size: 0.9rem;">
        Данные: ЦБ РФ • Обновление: каждый день
      </div>
    </header>

    <div class="error" id="errorBox"></div>

    <div class="card">
      <div class="current-rate">
        <span class="rate-value" id="currentRate">--</span>
        <span class="rate-label">RUB за 1 USD</span>
      </div>
      <div style="color: var(--text-secondary); margin-top: 8px;" id="lastUpdate">
        Загрузка...
      </div>
    </div>

    <div class="card">
      <div class="controls">
        <button class="btn btn-outline" data-days="7">7 дней</button>
        <button class="btn btn-outline" data-days="30">30 дней</button>
        <button class="btn btn-outline" data-days="90">90 дней</button>
        <button class="btn" id="refreshBtn">⟳ Обновить</button>
      </div>
      <div class="chart-container">
        <canvas id="rateChart"></canvas>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:8080/api/v1/rates';
    let chart = null;

    // Утилиты
    const showError = (msg) => {
      const el = document.getElementById('errorBox');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 5000);
    };

    const fetchJSON = async (url) => {
      const res = await fetch(url);
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `HTTP ${res.status}`);
      }
      return res.json();
    };

    // Загрузка текущего курса
    const loadCurrentRate = async () => {
      try {
        const data = await fetchJSON(`${API_BASE}/current`);
        document.getElementById('currentRate').textContent = data.rate?.toFixed(4) || '--';
        document.getElementById('lastUpdate').textContent = data.date 
          ? `Обновлено: ${new Date(data.date).toLocaleDateString('ru-RU')}` 
          : 'Нет данных';
      } catch (e) {
        showError(`Не удалось загрузить курс: ${e.message}`);
      }
    };

    // Загрузка истории и отрисовка графика
    const loadHistory = async (days) => {
      try {
        document.getElementById('rateChart').parentNode.innerHTML = 
          '<div class="loading">Загрузка данных...</div>';
        
        const data = await fetchJSON(`${API_BASE}/history?days=${days}`);
        
        // Подготовка данных для Chart.js
        const labels = data.map(d => new Date(d.date).toLocaleDateString('ru-RU', {
          day: '2-digit', month: 'short'
        }));
        const values = data.map(d => d.rate);

        // Уничтожаем старый график, если есть
        if (chart) chart.destroy();

        const ctx = document.getElementById('rateChart');
        // Восстанавливаем canvas после очистки
        if (!ctx) {
          const container = document.querySelector('.chart-container');
          container.innerHTML = '<canvas id="rateChart"></canvas>';
        }

        chart = new Chart(document.getElementById('rateChart'), {
          type: 'line',
          data: {
            labels,
            datasets: [{
              label: 'USD/RUB',
              data: values,
              borderColor: '#FCD535',
              backgroundColor: 'rgba(252, 213, 53, 0.1)',
              borderWidth: 2,
              pointRadius: 3,
              pointHoverRadius: 6,
              fill: true,
              tension: 0.3
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: '#161A1E',
                titleColor: '#EAECEF',
                bodyColor: '#EAECEF',
                borderColor: '#2B3139',
                borderWidth: 1,
                callbacks: {
                  label: ctx => ` ${ctx.parsed.y.toFixed(4)} RUB`
                }
              }
            },
            scales: {
              x: {
                grid: { color: '#2B3139' },
                ticks: { color: '#848E9C' }
              },
              y: {
                grid: { color: '#2B3139' },
                ticks: { 
                  color: '#848E9C',
                  callback: v => `${v} ₽`
                }
              }
            }
          }
        });
      } catch (e) {
        showError(`Ошибка графика: ${e.message}`);
      }
    };

    // Инициализация
    document.addEventListener('DOMContentLoaded', () => {
      loadCurrentRate();
      loadHistory(7);

      // Кнопки выбора периода
      document.querySelectorAll('[data-days]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const days = e.currentTarget.dataset.days;
          loadHistory(days);
          // Визуальное выделение активной кнопки
          document.querySelectorAll('[data-days]').forEach(b => 
            b.classList.remove('btn'));
          e.currentTarget.classList.add('btn');
        });
      });

      // Кнопка обновления
      document.getElementById('refreshBtn').addEventListener('click', () => {
        loadCurrentRate();
        const activeDays = document.querySelector('[data-days].btn')?.dataset.days || 7;
        loadHistory(activeDays);
      });

      // Автообновление каждые 5 минут (для демо)
      setInterval(loadCurrentRate, 5 * 60 * 1000);
    });
  </script>
</body>
</html>
